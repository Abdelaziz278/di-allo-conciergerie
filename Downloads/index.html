        const loadFromStorage = (key, fallback) => {
            try {
                const item = localStorage.getItem(key);
                if (item && item !== 'null' && item !== 'undefined') {
                    if (key === 'diallo_logo') return item;
                    const parsed = JSON.parse(item);
                    if (parsed !== null) return parsed;
                }
            } catch (e) { console.error("Erreur mémoire locale:", e); }
            return fallback;
        };

        const isCloudAvailable = typeof __firebase_config !== 'undefined' || true; // Force Cloud

        function useSyncedState(docName, initialValue, user) {
            const [state, setState] = useState(initialValue);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                const local = loadFromStorage('diallo_' + docName, null);
                if (local !== null) {
                    setState(local);
                    setIsLoaded(true);
                }

                if (!user || !window.fbDb) {
                    setIsLoaded(true);
                    return;
                }

                let firstLoad = true;
                const docRef = window.fbDoc(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'shared_workspace', docName);
                
                const timeout = setTimeout(() => setIsLoaded(true), 3000); 

                const unsub = window.fbOnSnapshot(docRef, (docSnap) => {
                    clearTimeout(timeout);
                    if (docSnap.exists()) {
                        setState(docSnap.data().value);
                    } else if (firstLoad) {
                        if (local !== null) {
                            window.fbSetDoc(docRef, { value: local });
                        } else {
                            window.fbSetDoc(docRef, { value: initialValue });
                        }
                    }
                    firstLoad = false;
                    setIsLoaded(true);
                }, (err) => {
                    console.error("Erreur de synchro Cloud:", err);
                    clearTimeout(timeout);
                    setIsLoaded(true);
                });

                return () => {
                    clearTimeout(timeout);
                    unsub();
                };
            }, [user, docName]);

            const saveState = (newValue) => {
                setState(newValue);
                localStorage.setItem('diallo_' + docName, typeof newValue === 'string' ? newValue : JSON.stringify(newValue));
                
                if (user && window.fbDb) {
                    const docRef = window.fbDoc(window.fbDb, 'artifacts', window.fbAppId, 'public', 'data', 'shared_workspace', docName);
                    window.fbSetDoc(docRef, { value: newValue }).catch(console.error);
                }
            };

            return [state, saveState, isLoaded];
        }

                      } else {
                          await fbSignInAnonymously(fbAuth);
                      }
                      fbOnAuthStateChanged(fbAuth, setUser);
                  } catch(e) { console.error(e); }
              };
              if (window.fbAuth) initFb();
              else window.addEventListener('firebase-ready', initFb);
              return () => window.removeEventListener('firebase-ready', initFb);
          }, []);

        function QuoteBuilderView({ clients, catalog, logoUrl, payload, onSave, onCancel }) {
          const existingQuote = payload ? payload.quote : null;
          const prospectId = payload ? payload.prospectId : null;

          const prospectRef = prospectId ? clients.find(c => c.id == prospectId) : null;
          const pData = prospectRef ? prospectRef.prospectData : null;

          const [currency, setCurrency] = useState(existingQuote && existingQuote.currency ? existingQuote.currency : 'FCFA');
          const [docType, setDocType] = useState(existingQuote && existingQuote.docType ? existingQuote.docType : 'devis');

          const [clientId, setClientId] = useState((existingQuote && existingQuote.clientId) ? existingQuote.clientId : (prospectId || (clients.length > 0 ? clients[0].id : '')));
          const [quoteCity, setQuoteCity] = useState((existingQuote && existingQuote.quoteCity) ? existingQuote.quoteCity : (pData && pData.dest ? pData.dest : 'Casa'));
          const [tripName, setTripName] = useState((existingQuote && existingQuote.tripName) ? existingQuote.tripName : (pData && pData.dest ? ("Séjour CAN " + pData.dest) : 'Séjour VIP Maroc'));
          const [pax, setPax] = useState((existingQuote && existingQuote.pax) ? existingQuote.pax : (pData && pData.pax ? parseInt(pData.pax) : 2));
          
          const [dateIn, setDateIn] = useState((existingQuote && existingQuote.dateIn) ? existingQuote.dateIn : (pData && pData.dateIn ? pData.dateIn : ''));
          const [dateOut, setDateOut] = useState((existingQuote && existingQuote.dateOut) ? existingQuote.dateOut : (pData && pData.dateOut ? pData.dateOut : ''));
          const [globalSeason, setGlobalSeason] = useState((existingQuote && existingQuote.globalSeason) ? existingQuote.globalSeason : 'moyenne');

          const calculatedNights = useMemo(() => {
              if(dateIn && dateOut) {
                  const diff = new Date(dateOut) - new Date(dateIn);
                  return Math.max(1, Math.ceil(diff / (1000 * 60 * 60 * 24)));
              }
              return 1;
          }, [dateIn, dateOut]);
          
          const [accommodations, setAccommodations] = useState((existingQuote && existingQuote.accommodations) ? existingQuote.accommodations : []);
          const [activities, setActivities] = useState((existingQuote && existingQuote.activities) ? existingQuote.activities : []);
          const [transports, setTransports] = useState((existingQuote && existingQuote.transports) ? existingQuote.transports : []);
          const [cars, setCars] = useState((existingQuote && existingQuote.cars) ? existingQuote.cars : []);

          const [isAutoFee, setIsAutoFee] = useState(existingQuote ? existingQuote.isAutoFee : true);
          const [manualFeeMAD, setManualFeeMAD] = useState((existingQuote && existingQuote.manualFeeMAD) ? existingQuote.manualFeeMAD : 0);
          const [feeComment, setFeeComment] = useState((existingQuote && existingQuote.feeComment) ? existingQuote.feeComment : '');

          const FEE_THRESHOLD_MAD = 40000; 
          const FLAT_FEE_MAD = 4000; 
          const PERCENT_FEE = 0.10;

          const allAvailableCities = useMemo(() => {
              const cities = new Set(["Casa", "Marrakech", "Agadir", "Rabat", "Fès", "Tanger", "Chefchaouen"]);
              if (catalog.accommodations) catalog.accommodations.forEach(a => { if (a.city) cities.add(a.city.trim()); });
              if (catalog.activities) catalog.activities.forEach(a => { if (a.city) cities.add(a.city.trim()); });
              return Array.from(cities).sort();
          }, [catalog]);

          const filteredAccommodations = catalog.accommodations ? catalog.accommodations.filter(a => a.city && a.city.trim().toLowerCase() === quoteCity.trim().toLowerCase()) : [];
          const filteredActivities = catalog.activities ? catalog.activities.filter(a => a.city && a.city.trim().toLowerCase() === quoteCity.trim().toLowerCase()) : [];

          const handleAddAccom = (e) => {
            const item = catalog.accommodations.find(a => a.id == e.target.value);
            if (item) setAccommodations([...accommodations, { ...item, season: globalSeason, nights: calculatedNights, customNote: '' }]);
            e.target.value = '';
          };
          const handleAddActivity = (e) => {
            const item = catalog.activities.find(a => a.id == e.target.value);
            const qty = item.pricingMode === 'pax' ? pax : 1; 
            if (item) setActivities([...activities, { ...item, quantity: qty }]);
            e.target.value = '';
          };
          const handleAddTransport = (e) => {
            const item = catalog.transports.find(a => a.id == e.target.value);
            const qty = item.pricingMode === 'pax' ? pax : 1;
            if (item) setTransports([...transports, { ...item, quantity: qty }]);
            e.target.value = '';
          };
          const handleAddCar = (e) => {
            const item = catalog.cars.find(a => a.id == e.target.value);
            if (item) setCars([...cars, { ...item, days: calculatedNights }]);
            e.target.value = '';
          };

          const updateList = (setter, list, index, field, value) => {
            const newList = [...list];
            newList[index][field] = value;
            setter(newList);
          };
          const removeList = (setter, list, index) => {
            const newList = [...list];
            newList.splice(index, 1);
            setter(newList);
          };

          const calcAccomMAD = accommodations.reduce((sum, item) => sum + ((item.prices && item.prices[item.season] ? item.prices[item.season] : 0) * item.nights), 0);
          const calcActMAD = activities.reduce((sum, item) => sum + ((item.price || 0) * item.quantity), 0);
          const calcTransMAD = transports.reduce((sum, item) => sum + ((item.price || 0) * item.quantity), 0);
          const calcCarMAD = cars.reduce((sum, item) => sum + ((item.price || 0) * item.days), 0);
          
          const subTotalMAD = calcAccomMAD + calcActMAD + calcTransMAD + calcCarMAD;
          let calcFeeMAD = 0;
          if (subTotalMAD > 0) calcFeeMAD = subTotalMAD > FEE_THRESHOLD_MAD ? subTotalMAD * PERCENT_FEE : FLAT_FEE_MAD;
          const finalFeeMAD = isAutoFee ? calcFeeMAD : (parseFloat(manualFeeMAD) || 0);
          const totalMAD = subTotalMAD + finalFeeMAD;

          const doSave = () => {
            if(!clientId) { alert("Veuillez sélectionner un client."); return; }
            const q = {
              id: (existingQuote && existingQuote.id) ? existingQuote.id : `DEV-${Date.now().toString().slice(-6)}`,
              date: (existingQuote && existingQuote.date) ? existingQuote.date : new Date().toLocaleDateString('fr-FR'),
              clientId: parseInt(clientId),
              docType,
              quoteCity, tripName, pax, currency, dateIn, dateOut, globalSeason,
              accommodations, activities, transports, cars,
              isAutoFee, manualFeeMAD, feeComment,
              total: totalMAD, subTotal: subTotalMAD, finalFee: finalFeeMAD,
              status: (existingQuote && existingQuote.status) ? existingQuote.status : 'Brouillon'
            };
            onSave(q);
          };

          const uniqueCities = Array.from(new Set([...accommodations.map(a => a.city), ...activities.map(a => a.city)]));
          const displayCities = uniqueCities.length > 0 ? uniqueCities.join(', ') : quoteCity;

          return (
            <div className="max-w-7xl mx-auto pb-20">
              
              {/* === HEADER ACTIONS (No Print) === */}
              <div className="bg-slate-900 rounded-2xl p-4 md:p-6 text-white flex flex-col md:flex-row justify-between items-center shadow-xl mb-8 no-print sticky top-4 z-40">
                <div className="flex items-center gap-3 mb-4 md:mb-0">
                  <div className="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center text-slate-900 text-2xl font-bold">
                    <i className="ph ph-magic-wand"></i>
                  </div>
                  <div>
                    <h2 className="text-xl md:text-2xl font-black">{existingQuote ? 'Modifier le Document' : 'Création de Document'}</h2>
                    <p className="text-slate-400 text-sm">Préparez votre offre client</p>
                  </div>
                </div>
                <div className="flex gap-2 items-center w-full md:w-auto overflow-x-auto">
                  <select value={currency} onChange={(e) => setCurrency(e.target.value)} className="bg-slate-800 text-white p-2 rounded-lg outline-none focus:ring-2 focus:ring-amber-500 mr-1 font-bold text-sm">
                    <option value="MAD">MAD</option>
                    <option value="FCFA">FCFA</option>
                    <option value="EUR">EUR</option>
                  </select>
                  <button onClick={onCancel} className="px-3 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-medium transition flex-1 md:flex-none whitespace-nowrap">Annuler</button>
                  <button onClick={() => window.print()} className="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 flex-1 md:flex-none whitespace-nowrap">
                    <i className="ph ph-printer"></i> PDF
                  </button>
                  <button onClick={() => {
                    const client = clients.find(c => c.id == clientId);
                    const subject = encodeURIComponent("Votre offre de séjour : " + tripName);
                    const body = encodeURIComponent("Bonjour " + (client && client.firstName ? client.firstName : '') + ",\n\nVeuillez trouver ci-joint notre proposition pour votre séjour au Maroc.\n\n(N'oubliez pas de joindre le PDF généré !)\n\nBien cordialement,\nL'équipe Di.allo Conciergerie");
                    window.location.href = "mailto:" + (client && client.email ? client.email : '') + "?subject=" + subject + "&body=" + body;
                  }} className="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition flex items-center justify-center gap-2 flex-1 md:flex-none whitespace-nowrap">
                    <i className="ph ph-envelope-simple"></i> Email
                  </button>
                  <button onClick={doSave} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition flex items-center justify-center gap-2 flex-1 md:flex-none whitespace-nowrap shadow-lg shadow-amber-500/20">
                    <i className="ph ph-floppy-disk"></i> Enregistrer
                  </button>
                </div>
              </div>

              {/* === BUILDER GRID === */}
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-8 no-print">
                
                {/* LEFT COL: EDITOR */}
                <div className="xl:col-span-2 space-y-6">
                  
                  {/* WIDGET PROSPECT (Visible uniquement si création depuis un prospect) */}

                  setEditingItem({ type, isNew: true, data: { id: Date.now().toString(), city: 'Casa', name: 'Nouvel Hébergement', type: 'Studio', pricingMode: 'nuit', prices: { basse: 0, moyenne: 0, haute: 0 } } });

                  setEditingItem({ type, isNew: true, data: { id: Date.now().toString(), city: 'Casa', name: 'Nouvelle Activité', pricingMode: 'pax', price: 0 } });
              } else if(type === 'transports') {
                  setEditingItem({ type, isNew: true, data: { id: Date.now().toString(), mode: 'Van privé', name: 'Nouveau Trajet', pricingMode: 'group', price: 0 } });
              } else if(type === 'cars') {
                  setEditingItem({ type, isNew: true, data: { id: Date.now().toString(), name: 'Nouveau Véhicule', pricingMode: 'jour', price: 0 } });
              }
          }

          const saveEdit = (type, item) => {
              if (!catalog[type]) {
                  alert("Erreur technique: type de catalogue introuvable.");
                  return;
              }
              
              let processed = { ...item };
              
              if (processed.name) processed.name = processed.name.trim();
              if (processed.city) processed.city = processed.city.trim();
              if (processed.mode) processed.mode = processed.mode.trim();
              
              if (type === 'accommodations') {
                  processed.prices = {
                      basse: Number((item.prices && item.prices.basse) ? item.prices.basse : 0) || 0,
                      moyenne: Number((item.prices && item.prices.moyenne) ? item.prices.moyenne : 0) || 0,
                      haute: Number((item.prices && item.prices.haute) ? item.prices.haute : 0) || 0
                  };
              } else {
                  processed.price = Number(item.price) || 0;
              }

              if (editingItem.isNew) {
                  setCatalog({...catalog, [type]: [processed, ...catalog[type]]});
              } else {
                  const newList = catalog[type].map(a => a.id === item.id ? processed : a);
                  setCatalog({...catalog, [type]: newList});
              }
              setEditingItem(null);
          };

          const deleteItem = (type, id) => {
              if(window.confirm("Êtes-vous sûr de vouloir supprimer cet élément ?")) {
                  const newList = catalog[type].filter(a => a.id !== id);
                  setCatalog({...catalog, [type]: newList});
                  setEditingItem(null);
              }
          }

          return (
             <div className="max-w-7xl mx-auto space-y-6 pb-12">
              <div className="flex justify-between items-end border-b border-slate-200 pb-4">

                                    <option value="Lune de miel">Lune de miel</option>
                                    <option value="Anniversaire">Anniversaire</option>
                                    <option value="EVG / EVJF">EVG / EVJF</option>
                                </select>
                            </div>
                        </div>
                        <div><label className="block text-sm font-bold text-slate-300 mb-1">Message libre / Remarques</label><textarea placeholder="Besoins particuliers, enfants en bas âge, allergies, horaires de vol connus..." onChange={e=>setFormData({...formData, requests: e.target.value})} className="w-full p-3 bg-slate-800 border border-slate-700 focus:border-amber-500 text-white outline-none rounded-xl h-24"></textarea></div>
                    </div>

                    <button type="submit" className="w-full bg-amber-500 text-slate-900 font-black py-4 rounded-xl hover:bg-amber-600 transition shadow-lg mt-8 text-xl flex justify-center items-center gap-2">
                        <i className="ph ph-paper-plane-tilt"></i> Envoyer ma demande
                    </button>
                </form>
              </div>
            );
        }

        function SettingsView({ logoUrl, saveLogoUrl, catalog, saveCatalog, clients, saveClients, quotes, saveQuotes, orders, saveOrders, requests, saveRequests }) {
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        saveLogoUrl(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleExportCSV = () => {
                const data = {
                    catalog: JSON.stringify(catalog),
                    clients: JSON.stringify(clients),
                    quotes: JSON.stringify(quotes),
                    orders: JSON.stringify(orders),
                    requests: JSON.stringify(requests),
                    logo: logoUrl
                };
                
                let csv = "Cle,ValeurJSON\n";
                for (let key in data) {
                    if (data[key]) {
                        // Remplacement sécurisé des guillemets pour éviter la casse du CSV
                        let val = data[key].replace(/"/g, '""');
                        csv += `${key},"${val}"\n`;
                    }
                }
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diallo_sauvegarde_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        let success = false;
                        
                        // 1. Tenter de lire comme un ancien fichier JSON (au cas où l'utilisateur se trompe)
                        if(text.trim().startsWith('{') || text.trim().startsWith('[')) {
                            const parsed = JSON.parse(text);
                            if(parsed.catalog || parsed.clients) {
                                if (parsed.catalog) saveCatalog(typeof parsed.catalog === 'string' ? JSON.parse(parsed.catalog) : parsed.catalog);
                                if (parsed.clients) saveClients(typeof parsed.clients === 'string' ? JSON.parse(parsed.clients) : parsed.clients);
                                if (parsed.quotes) saveQuotes(typeof parsed.quotes === 'string' ? JSON.parse(parsed.quotes) : parsed.quotes);
                                if (parsed.orders) saveOrders(typeof parsed.orders === 'string' ? JSON.parse(parsed.orders) : parsed.orders);
                                if (parsed.requests) saveRequests(typeof parsed.requests === 'string' ? JSON.parse(parsed.requests) : parsed.requests);
                                if (parsed.logo) saveLogoUrl(parsed.logo);
                                alert('Ancienne sauvegarde JSON restaurée avec succès ! L\'application va redémarrer.');
                                window.location.reload();
                                return;
                            }
                        }

                        // 2. Traitement CSV ultra robuste (même si ouvert avec Excel)
                        // On utilise une regex qui capture proprement le contenu entre guillemets même avec des sauts de ligne
                        const regex = /([^,\n\r]+),"([\s\S]*?)"(?=\r?\n[^,\n\r]+,"|$)/g;
                        let match;
                        
                        while ((match = regex.exec(text)) !== null) {
                            const key = match[1].trim();
                            const val = match[2].replace(/""/g, '"'); // Restauration des guillemets d'origine
                            
                            if (key === 'catalog') { saveCatalog(JSON.parse(val)); success = true; }
                            if (key === 'clients') { saveClients(JSON.parse(val)); success = true; }
                            if (key === 'quotes') { saveQuotes(JSON.parse(val)); success = true; }
                            if (key === 'orders') { saveOrders(JSON.parse(val)); success = true; }
                            if (key === 'requests') { saveRequests(JSON.parse(val)); success = true; }
                            if (key === 'logo') { saveLogoUrl(val); success = true; }
                        }
                        
                        if(success) {
                            alert('Sauvegarde CSV restaurée avec succès ! L\'application va redémarrer.');
                            window.location.reload();
                        } else {
                            throw new Error("Aucune donnée valide trouvée dans le CSV");
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Erreur lors de la lecture du fichier. Assurez-vous que c\'est bien le fichier téléchargé d\'origine sans l\'avoir modifié manuellement.');
                    }
                };
                reader.readAsText(file);
            };

            const handleReset = () => {
                if(window.confirm("ATTENTION : Cela va effacer toutes vos données (Clients, Devis, Commandes, Factures) et remettre le catalogue à zéro partout. Êtes-vous sûr ?")) {
                    saveCatalog(initialCatalog);
                    saveClients(initialClients);
                    saveQuotes([]);
                    saveOrders([]);
                    saveRequests([]);
                    saveLogoUrl('');
                    localStorage.clear();
                    window.location.reload();
                }
            };

            return (
              <div className="max-w-4xl mx-auto space-y-6 pb-20">
                <div className="flex justify-between items-end border-b border-slate-200 pb-4">
                  <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">Paramètres</h2>
                    <p className="text-slate-500 mt-1">Gérez l'identité visuelle et les sauvegardes de votre application.</p>
                  </div>
                </div>
                
                {/* Logo Section */}
                <div className="bg-white p-8 rounded-2xl shadow border border-slate-100 max-w-2xl">
                    <h3 className="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><i className="ph ph-image"></i> Identité visuelle</h3>
                    <label className="block text-sm font-bold mb-2">URL du Logo ou Fichier Local</label>
                    <div className="flex gap-2 mb-4">
                        <input type="text" value={logoUrl} onChange={e=>saveLogoUrl(e.target.value)} placeholder="Entrez le nom ou lien vers votre logo" className="flex-1 p-3 border border-slate-200 rounded-lg bg-slate-50 outline-none focus:border-amber-500" />
                        <label className="cursor-pointer bg-slate-800 hover:bg-slate-700 text-white px-4 py-3 rounded-lg font-bold transition flex items-center gap-2 shrink-0">
                            <i className="ph ph-upload-simple text-xl"></i> Importer
                            <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                        </label>
                    </div>
                    <div className="p-4 border rounded-xl bg-slate-50 flex justify-center items-center min-h-[150px]">
                        {logoUrl ? <img src={logoUrl} alt="Prévisualisation" className="w-96 h-auto max-h-64 object-contain" /> : <span className="text-slate-400">Aucun logo</span>}
                    </div>
                </div>

                {/* Import/Export Section */}
                <div className="bg-white p-8 rounded-2xl shadow border border-slate-100 max-w-2xl mt-6">
                    <h3 className="font-bold text-lg mb-2 text-slate-800 flex items-center gap-2"><i className="ph ph-hard-drives"></i> Sauvegarde & Cloud</h3>
                    <p className="text-sm font-bold text-emerald-600 mb-2">✓ Vos données sont actuellement synchronisées via le Cloud.</p>
                    <p className="text-sm text-slate-600 mb-6">Vous pouvez également télécharger une copie de sécurité locale au format CSV sur votre ordinateur, ou la restaurer en cas de besoin.</p>
                    
                    <div className="flex flex-col sm:flex-row gap-4">
                        <button onClick={handleExportCSV} className="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 shadow">
                            <i className="ph ph-download-simple text-xl text-amber-500"></i> Sauvegarder en CSV
                        </button>
                        
                        <label className="flex-1 cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 border border-slate-300 shadow-sm text-center">
                            <i className="ph ph-upload-simple text-xl text-blue-500"></i> Restaurer (CSV)
                            <input type="file" accept=".csv,.json" className="hidden" onChange={handleImportCSV} />
                        </label>
                    </div>
                </div>

                {/* Danger Zone */}
                <div className="bg-red-50 p-8 rounded-2xl border border-red-200 max-w-2xl mt-6">
                    <h3 className="font-bold text-red-600 mb-2 flex items-center gap-2"><i className="ph ph-warning-circle"></i> Zone de Danger</h3>
                    <p className="text-sm text-slate-600 mb-4">La réinitialisation supprimera définitivement tous vos clients, devis, commandes et remettra le catalogue à zéro partout. Assurez-vous d'avoir fait une sauvegarde avant.</p>
                    <button onClick={handleReset} className="bg-white border-2 border-red-300 hover:bg-red-100 text-red-600 font-bold py-2 px-6 rounded-lg transition-colors w-full sm:w-auto">
                        Réinitialiser l'application
                    </button>
                </div>

              </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
